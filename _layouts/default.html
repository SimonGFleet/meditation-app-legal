<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <style>
    :root {
      --bg: #f1efe8;
      --card: #fbf8f2;
      --text: #18312b;
      --text-muted: #52645d;
      --border: #ddd7cc;
      --accent: #18312b;
      --link: #567467;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.55;
    }
    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    header {
      margin-bottom: 32px;
    }
    header a {
      color: var(--text);
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    main {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 40px 36px;
    }
    main h1 {
      font-size: 30px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    main h2 {
      font-size: 20px;
      font-weight: 700;
      margin: 32px 0 12px;
    }
    main h3 {
      font-size: 16px;
      font-weight: 700;
      margin: 24px 0 8px;
    }
    main p {
      margin: 0 0 16px;
      color: var(--text);
    }
    main ul, main ol {
      padding-left: 22px;
      margin: 0 0 16px;
    }
    main li {
      margin-bottom: 8px;
    }
    main a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    main a:hover {
      text-decoration: none;
    }
    main strong {
      font-weight: 700;
    }
    @media (max-width: 480px) {
      .wrap { padding: 32px 16px 60px; }
      main { padding: 28px 22px; border-radius: 20px; }
      main h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </header>
    <main>
      {{ content }}
    </main>
  </div>
</body>
</html>
