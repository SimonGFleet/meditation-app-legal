<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — Meditation App</title>
  <style>
    :root {
      --bg: #f1efe8;
      --card: #fbf8f2;
      --text: #18312b;
      --text-muted: #52645d;
      --border: #ddd7cc;
      --accent: #18312b;
      --destructive: #9b4736;
      --success: #2f6e3b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 440px;
      margin: 0 auto;
      padding: 64px 24px 48px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 32px 28px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px;
    }
    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
      margin: 0 0 24px;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin: 16px 0 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #fffdf8;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      background: var(--accent);
      color: #fffaf4;
      border: none;
      border-radius: 22px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .error {
      color: var(--destructive);
      font-size: 14px;
      margin-top: 16px;
    }
    .success {
      color: var(--success);
      font-size: 15px;
      margin: 0;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Reset your password</h1>

      <div id="loading">
        <p>Checking your reset link…</p>
      </div>

      <div id="invalid" class="hidden">
        <p>This password reset link is invalid or has expired. Open the Meditation App and request a new one.</p>
      </div>

      <div id="form-wrap" class="hidden">
        <p>Enter a new password for your account.</p>
        <form id="reset-form">
          <label for="password">New password</label>
          <input
            type="password"
            id="password"
            required
            minlength="8"
            autocomplete="new-password"
          />

          <label for="confirm">Confirm password</label>
          <input
            type="password"
            id="confirm"
            required
            minlength="8"
            autocomplete="new-password"
          />

          <div id="error" class="error hidden"></div>
          <button type="submit" id="submit-btn">Update password</button>
        </form>
      </div>

      <div id="success" class="hidden">
        <p class="success">Password updated. Open the Meditation App and sign in with your new password.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://vvgtztbjqpqvouskncgo.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_UfV2WH1ctvgdw6wVhrB4iQ_3QdB_wwF";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    const $ = (id) => document.getElementById(id);
    const show = (id) => $(id).classList.remove("hidden");
    const hide = (id) => $(id).classList.add("hidden");

    let recoveryReady = false;

    function showForm() {
      if (recoveryReady) return;
      recoveryReady = true;
      hide("loading");
      show("form-wrap");
    }

    client.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY") {
        showForm();
      }
    });

    // Fallback in case the PASSWORD_RECOVERY event fires before the listener
    // attaches, or the URL is malformed. Wait briefly, then inspect the URL.
    window.addEventListener("load", () => {
      setTimeout(async () => {
        if (recoveryReady) return;

        const hash = window.location.hash || "";
        const params = new URLSearchParams(hash.startsWith("#") ? hash.slice(1) : hash);
        const err = params.get("error_description") || params.get("error");
        const type = params.get("type");

        if (err) {
          hide("loading");
          show("invalid");
          return;
        }

        const { data } = await client.auth.getSession();
        if (data.session && type === "recovery") {
          showForm();
        } else if (data.session) {
          // Session exists from an old cached token, but URL doesn't carry a
          // recovery type. Safer to treat as invalid.
          hide("loading");
          show("invalid");
        } else {
          hide("loading");
          show("invalid");
        }
      }, 1200);
    });

    $("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = $("password").value;
      const confirm = $("confirm").value;
      const errEl = $("error");
      const btn = $("submit-btn");

      hide("error");

      if (password !== confirm) {
        errEl.textContent = "Passwords do not match.";
        show("error");
        return;
      }

      if (password.length < 8) {
        errEl.textContent = "Password must be at least 8 characters.";
        show("error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Updating…";

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        errEl.textContent = error.message;
        show("error");
        btn.disabled = false;
        btn.textContent = "Update password";
        return;
      }

      await client.auth.signOut();
      hide("form-wrap");
      show("success");
    });
  </script>
</body>
</html>
